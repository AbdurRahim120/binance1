<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script
      src="https://kit.fontawesome.com/770e654504.js"
      crossorigin="anonymous"
    ></script>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "IBM Plex Sans", sans-serif;
        background-color: rgb(24, 26, 32);
        color: #eaecef;
      }
      .nav-container {
        display: flex;
        background-color: rgb(24, 26, 32);
        color: #eaecef;
        justify-content: space-between;
        align-items: center;
        max-width: 100vw;
        height: 64px;
        font-size: 14px;
        font-weight: 600;
        padding: 0px 24px;
      }
      .left-nav {
        display: flex;
      }
      .menu {
        background-color: rgb(24, 26, 32);
        color: #eaecef;
        text-decoration: none;
        list-style: none;
      }
      .menu:hover,
      .right-nav a:hover,
      .icon0:hover {
        color: rgb(252, 213, 53);
      }
      .icon0 {
        color: #eaecef;
      }
      .nav-img {
        width: 10rem;
      }
      .nav-menus {
        display: flex;
        gap: 25px;
        margin-left: 20px;
      }
      .right-nav {
        display: flex;
        font-size: 18px;
        font-weight: 600;
        gap: 20px;
      }
      .register {
        padding: 6px 8px;
        background-color: rgb(252, 213, 53);
        color: black;
        border-radius: 5px;
        font-weight: 600;
        outline: none;
        border: none;
        font-size: 14px;
      }
      .fa-gift {
        margin-right: 5px;
      }
      .hamburger {
        display: none;
        font-size: 20px;
        font-weight: 800;
        color: white;
      }

      @media screen and (max-width: 768px) {
        .menu,
        .fa-globe,
        .fa-square-caret-down {
          display: none !important;
        }
        .right-nav {
          gap: 0px;
        }
        .nav-btn,
        .fa-magnifying-glass,
        .fa-bars {
          margin: 0px 10px;
        }
        /* .banner-container {
          flex-direction: column;
          padding: 42px 46px;
          height: fit-content;
        } */
        .hamburger {
          display: flex;
          cursor: pointer;
        }
        .hamburger #closeHam {
          display: none;
        }
        .nav-menus {
          display: none;
          flex-direction: column;
          align-items: center;
          position: absolute;
          right: 0;
          top: 64px;
          background-color: rgb(73, 51, 153);
          width: 100%;
          height: calc(100vh - 64px);
          /* padding-top: 60px; */
          gap: 10vh;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="nav-container">
        <div class="left-nav">
          <h1>helllll</h1>
          <div class="nav-menus" id="nav-menus">
            <li class="menu">Buy Crypto</li>
            <li class="menu">Markets</li>
            <li class="menu">Trade</li>
            <li class="menu">Futures</li>
            <li class="menu">Earn</li>
            <li class="menu">Square</li>
            <li class="menu">More</li>
          </div>
        </div>
        <div onclick="" class="right-nav">
          <a href="#"
            ><i
              class="fa-solid fa-magnifying-glass icon0"
              style="color: #ffffff"
            ></i
          ></a>
          <a class="nav-btn">Log In</a>
          <button class="nav-btn register">
            <i class="fa-solid fa-gift" style="color: #000000"></i>Register
          </button>
          <a href="#"
            ><i
              class="fa-regular fa-square-caret-down icon0"
              style="color: #ffffff"
            ></i
          ></a>
          <a href="#"
            ><i class="fa-solid fa-globe icon0" style="color: #ffffff"></i
          ></a>
        </div>
        <div class="hamburger">
          <span id="openHam">&#9776;</span>
          <span id="closeHam">&#x2716;</span>
        </div>
      </div>
    </nav>
    <script>
      let openHam = document.querySelector("#openHam");
      let closeHam = document.querySelector("#closeHam");
      let navigationItems = document.querySelector("#nav-menus");
      const hamburgerEvent = (navigation, close, open) => {
        navigationItems.style.display = navigation;
        closeHam.style.display = close;
        openHam.style.display = open;
      };

      openHam.addEventListener("click", () =>
        hamburgerEvent("flex", "block", "none")
      );
      closeHam.addEventListener("click", () =>
        hamburgerEvent("none", "none", "block")
      );
    </script>
  </body>
</html>
