<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: rgb(24, 26, 32);
        color: aliceblue;
      }

      #login-container {
        background-color: rgb(24, 26, 32);
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        border-radius: 8px;
        overflow: hidden;
        display: flex;
        justify-content: center;
        gap: 100px;
        align-items: center;
      }
      #login-container h1{
        font-weight: 700;
        font-size: 24px;
      }

      #login-form {
        padding: 20px;
        width: 384px;
      }

      #login-form label {
        display: block;
        margin-bottom: 8px;
      }

      #login-form input {
        width: 100%;
        padding: 8px;
        margin-bottom: 16px;
        box-sizing: border-box;
        background-color: rgb(24, 26, 32);
        border: 1px solid gray;
        border-radius: 6px;
      }

      #login-form button {
        background-color: #fcd535;
        color: black;
        font-size: 16px;
        font-weight: 700;
        border: none;
        padding: 10px;
        cursor: pointer;
        width: 100%;
        border-radius: 6px;
      }
      .hr-or{
        display: flex;
        margin: 15px 0px;
      }
      .hr-or hr{
        width: 44%;
      }
      #countinue-with{
        margin: 10px 0;
        background-color: rgb(71, 77, 87);
        color: white;
        font-size: 16px;
        font-weight: 700;
        border: none;
        padding: 10px;
        cursor: pointer;
        width: 95%;
        border-radius: 6px;
        text-align: center;
      }
      .login-qrcode{
        display: flex;
        
      }
      .login-qrcode img{
        width: 200px;
        margin-right: 10px;

      }

    </style>
  </head>
  <body>
    <div id="login-container">
        <form id="login-form">
          <h1>Log In</h1>
        <label for="username">Email/Phone Number</label>
        <input type="text" id="username" name="username" required />

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required />

        <button type="submit">Login</button>
        <div class="hr-or"> 
            <hr> or <hr>
        </div>
        <div type="submit" id="countinue-with">Continue with Google</div>
        <div type="submit" id="countinue-with">Continue with Apple</div>
        <p class="color-1">Create a Binance Account</p>
    </form>
      <div class="right-side-img">
        <p>Log in with QR code</p>
        <div class="login-qrcode">
          <img src="./chart-binance.png" alt="" />
          <img src="./chart-binance.png" alt="" />
        </div>
        <p>
          Scan this code with the
          <span class="color-1">Binance mobile app</span> to log in instantly.
        </p>
      </div>
    </div>
  </body>
</html>
